<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Tracker</title>
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-color: #333333;
      --text-muted: #666666;
      --border-color: #e1e4e8;
      --accent-color: #0070f3;
      --accent-hover: #0051a8;
      --success-color: #22c55e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #f5f5f5;
        --text-muted: #aaaaaa;
        --border-color: #333333;
        --accent-color: #3291ff;
        --accent-hover: #0070f3;
        --success-color: #2ec27e;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      max-width: 540px;
      margin: 0 auto;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    .form-container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.04);
      border: 1px solid var(--border-color);
    }

    h2 { margin-top: 0; margin-bottom: 24px; font-size: 22px; text-align: center; }

    .form-group { margin-bottom: 22px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

    select, input[type="date"], input[type="number"], textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }

    textarea { resize: vertical; min-height: 90px; }

    /* --- DUAL DROPDOWN FLEX ROW --- */
    .time-pickers-row {
      display: flex;
      gap: 14px;
    }
    .time-picker-box {
      flex: 1;
    }

    /* --- DURATION QUICK CHIPS --- */
    .duration-btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 14px;
    }
    .duration-chip {
      background-color: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 10px 4px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }
    .duration-chip:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }
    .duration-chip.active {
      background-color: var(--accent-color);
      color: #ffffff;
      border-color: var(--accent-color);
    }

    .window-preview-box {
      background-color: rgba(0,112,243,0.06);
      border: 1px dashed var(--accent-color);
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      color: var(--text-color);
      text-align: center;
    }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }
    button.submit-btn:hover { background-color: var(--accent-hover); }
    button.submit-btn:disabled { background-color: var(--text-muted); cursor: not-allowed; }

    #statusMessage {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      font-size: 14px;
      display: none;
    }
    .status-success { background-color: rgba(34,197,94,0.15); color: var(--success-color); border: 1px solid var(--success-color); }
    .status-error { background-color: rgba(211,47,47,0.15); color: #d32f2f; border: 1px solid #d32f2f; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>🚀 Team Task Tracker</h2>
    <form id="taskForm" onsubmit="submitTaskLog(event)">
      
      <div class="form-group">
        <label for="teamMember">Team Member</label>
        <select id="teamMember" required>
          <option value="" disabled selected>Loading...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskDate">Date</label>
        <input type="date" id="taskDate" required>
      </div>

      <div class="form-group">
        <div class="time-pickers-row">
          <div class="time-picker-box">
            <label for="startTimeSelect">Start Time</label>
            <select id="startTimeSelect" required onchange="onManualTimeChange()">
              </select>
          </div>
          <div class="time-picker-box">
            <label for="endTimeSelect">End Time</label>
            <select id="endTimeSelect" required onchange="onManualTimeChange()">
              </select>
          </div>
        </div>

        <label style="margin-top: 14px; margin-bottom: 4px;">Quick Add Duration</label>
        <div class="duration-btn-grid">
          <div class="duration-chip" data-mins="15" onclick="applyDurationChip(15, this)">15m</div>
          <div class="duration-chip" data-mins="30" onclick="applyDurationChip(30, this)">30m</div>
          <div class="duration-chip" data-mins="60" onclick="applyDurationChip(60, this)">1h</div>
          <div class="duration-chip" data-mins="120" onclick="applyDurationChip(120, this)">2h</div>
        </div>

        <div class="window-preview-box" id="windowPreview">
          Total Duration: --
        </div>
      </div>

      <div class="form-group">
        <label for="taskDetails">Task Details / Descriptions</label>
        <textarea id="taskDetails" placeholder="What task items did you complete during this window?" required></textarea>
      </div>

      <div class="form-group">
        <label for="itemsProcessed">Number of Items Processed</label>
        <input type="number" id="itemsProcessed" min="0" placeholder="e.g. 15">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Task Log</button>
    </form>

    <div id="statusMessage"></div>
  </div>

  <script>
    const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbzmwrKyAHgkbh4mRpjIv0x_VRJTzIWMCy_q9oUopQoLXJHlFRyOe7PTv7cEM5m5dnNRTw/exec";
    const MASTER_TOKEN = "589643"; 

    let finalCalculatedTimeWindow = "";
    let finalCalculatedDuration = "";

    window.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('taskDate').value = `${yyyy}-${mm}-${dd}`;
      
      populateTimeDropdowns();
      initializeRosterWithCache();
    });

    function populateTimeDropdowns() {
      const startSelect = document.getElementById('startTimeSelect');
      const endSelect = document.getElementById('endTimeSelect');
      
      for(let h=0; h<24; h++) {
        for(let m=0; m<60; m+=15) {
          let hrs = h % 12 === 0 ? 12 : h % 12;
          let mins = m === 0 ? "00" : m;
          let ampm = h >= 12 ? "PM" : "AM";
          let padH = hrs < 10 ? "0" + hrs : hrs;
          let stringVal = `${padH}:${mins} ${ampm}`;
          
          // Options for Start Time Dropdown
          let optStart = document.createElement('option');
          optStart.value = stringVal; optStart.textContent = stringVal;
          startSelect.appendChild(optStart);
          if(h === 8 && m === 0) optStart.selected = true; // Default 8:00 AM
          
          // Options for End Time Dropdown
          let optEnd = document.createElement('option');
          optEnd.value = stringVal; optEnd.textContent = stringVal;
          endSelect.appendChild(optEnd);
          if(h === 8 && m === 30) optEnd.selected = true; // Default 8:30 AM
        }
      }
      
      // Seed midnight end option boundary to allow long day closures cleanly
      let optMidnight = document.createElement('option');
      optMidnight.value = "12:00 AM"; optMidnight.textContent = "12:00 AM";
      endSelect.appendChild(optMidnight);

      calculateTimeStrings();
    }

    function parseTimeToMinutes(timeStr) {
      if(!timeStr) return 0;
      let parts = timeStr.split(' ')[0].split(':');
      let ampm = timeStr.split(' ')[1];
      let h = parseInt(timeParts = parts[0], 10);
      let m = parseInt(parts[1], 10);
      if(h === 12) h = ampm === 'AM' ? 0 : 12;
      else if(ampm === 'PM') h += 12;
      return (h * 60) + m;
    }

    function stringifyMinutes(totalMins) {
      let hrRaw = Math.floor(totalMins / 60) % 24;
      let mnRaw = totalMins % 60;
      let outH = hrRaw % 12 === 0 ? 12 : hrRaw % 12;
      let outM = mnRaw === 0 ? "00" : mnRaw;
      let outAMPM = hrRaw >= 12 ? "PM" : "AM";
      return `${outH < 10 ? '0'+outH : outH}:${outM} ${outAMPM}`;
    }

    function applyDurationChip(mins, element) {
      document.querySelectorAll('.duration-chip').forEach(chip => chip.classList.remove('active'));
      element.classList.add('active');
      
      const startStr = document.getElementById('startTimeSelect').value;
      let startMins = parseTimeToMinutes(startStr);
      let endMins = startMins + mins;
      
      document.getElementById('endTimeSelect').value = stringifyMinutes(endMins);
      calculateTimeStrings();
    }

    function onManualTimeChange() {
      // Clear out active buttons if user changes dropdowns manually
      document.querySelectorAll('.duration-chip').forEach(chip => chip.classList.remove('active'));
      calculateTimeStrings();
    }

    function calculateTimeStrings() {
      const startStr = document.getElementById('startTimeSelect').value;
      const endStr = document.getElementById('endTimeSelect').value;
      
      let startMins = parseTimeToMinutes(startStr);
      let endMins = parseTimeToMinutes(endStr);
      
      let diff = endMins - startMins;
      if (diff <= 0) diff += 1440; // Safely process day rollovers

      let hrsText = Math.floor(diff / 60);
      let minsText = diff % 60;
      let outParts = [];
      if (hrsText > 0) outParts.push(`${hrsText} hr${hrsText > 1 ? 's' : ''}`);
      if (minsText > 0) outParts.push(`${minsText} min${minsText > 1 ? 's' : ''}`);
      
      finalCalculatedTimeWindow = `${startStr} - ${endStr}`;
      finalCalculatedDuration = outParts.join(' ') || "0 mins";

      document.getElementById('windowPreview').innerHTML = `⏳ Duration: <strong>${finalCalculatedDuration}</strong>`;
    }

    function initializeRosterWithCache() {
      const cachedNames = localStorage.getItem('tracker_roster_names_cache');
      if (cachedNames) {
        try { renderRosterDropdown(JSON.parse(cachedNames)); } catch(e) {}
      }
      fetchLiveRosterFromLeads();
    }

    function renderRosterDropdown(namesArray) {
      const memberSelect = document.getElementById('teamMember');
      const currentSelection = memberSelect.value;
      memberSelect.innerHTML = '<option value="" disabled selected>Select your name...</option>';
      if (Array.isArray(namesArray) && namesArray.length > 0) {
        namesArray.forEach(name => {
          if (name) {
            let opt = document.createElement('option'); opt.value = name; opt.textContent = name; memberSelect.appendChild(opt);
          }
        });
        if (currentSelection) memberSelect.value = currentSelection;
      }
    }

    function fetchLiveRosterFromLeads() {
      const scriptElement = document.createElement('script');
      scriptElement.src = DEPLOY_URL + "?callback=handleRosterLoad&token=" + MASTER_TOKEN + "&_cb=" + new Date().getTime();
      document.body.appendChild(scriptElement);
    }

    window.handleRosterLoad = function(data) {
      if (data && Array.isArray(data.names)) {
        const cleanNames = data.names.filter(Boolean);
        localStorage.setItem('tracker_roster_names_cache', JSON.stringify(cleanNames));
        renderRosterDropdown(cleanNames);
      }
    };

    function submitTaskLog(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const statusBox = document.getElementById('statusMessage');
      
      submitBtn.disabled = true;
      submitBtn.textContent = "Saving Log to Sheets...";
      statusBox.style.display = "none";

      const rawProcessedInput = document.getElementById('itemsProcessed').value;

      const payloadData = {
        token: MASTER_TOKEN,
        name: document.getElementById('teamMember').value,
        date: document.getElementById('taskDate').value,
        timeWindow: finalCalculatedTimeWindow,
        duration: finalCalculatedDuration,
        details: document.getElementById('taskDetails').value,
        itemsProcessed: rawProcessedInput ? parseInt(rawProcessedInput, 10) : "-"
      };

      fetch(DEPLOY_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payloadData)
      })
      .then(() => {
        statusBox.className = "status-success";
        statusBox.innerHTML = "🎉 Task logged successfully in real-time!";
        statusBox.style.display = "block";
        
        document.getElementById('taskDetails').value = "";
        document.getElementById('itemsProcessed').value = "";
        
        // Return to standard baseline defaults (8:00 AM - 8:30 AM)
        document.getElementById('startTimeSelect').value = "08:00 AM";
        document.getElementById('endTimeSelect').value = "08:30 AM";
        document.querySelectorAll('.duration-chip').forEach(chip => chip.classList.remove('active'));
        calculateTimeStrings();
      })
      .catch(err => {
        statusBox.className = "status-error";
        statusBox.innerHTML = "❌ Network connection dropped. Please try again.";
        statusBox.style.display = "block";
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Task Log";
      });
    }
  </script>
</body>
</html>
