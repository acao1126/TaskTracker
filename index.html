<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Tracker</title>
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-color: #333333;
      --text-muted: #666666;
      --border-color: #e1e4e8;
      --accent-color: #0070f3;
      --accent-hover: #0051a8;
      --success-color: #22c55e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #f5f5f5;
        --text-muted: #aaaaaa;
        --border-color: #333333;
        --accent-color: #3291ff;
        --accent-hover: #0070f3;
        --success-color: #2ec27e;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      max-width: 540px;
      margin: 0 auto;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    .form-container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.04);
      border: 1px solid var(--border-color);
    }

    h2 { margin-top: 0; margin-bottom: 24px; font-size: 22px; text-align: center; }

    .form-group { margin-bottom: 22px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

    select, input[type="date"], input[type="number"], textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }

    textarea { resize: vertical; min-height: 90px; }

    button {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: var(--accent-hover); }
    button:disabled { background-color: var(--text-muted); cursor: not-allowed; }

    #statusMessage {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      font-size: 14px;
      display: none;
    }
    .status-success { background-color: rgba(34,197,94,0.15); color: var(--success-color); border: 1px solid var(--success-color); }
    .status-error { background-color: rgba(211,47,47,0.15); color: #d32f2f; border: 1px solid #d32f2f; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>🚀 Team Task Tracker</h2>
    <form id="taskForm" onsubmit="submitTaskLog(event)">
      
      <div class="form-group">
        <label for="teamMember">Team Member</label>
        <select id="teamMember" required>
          <option value="" disabled selected>Loading...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskDate">Date</label>
        <input type="date" id="taskDate" required>
      </div>

      <div class="form-group">
        <label for="timeWindow">Time Window</label>
        <select id="timeWindow" required>
          <option value="" disabled selected>Select time range...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskDetails">Task Details / Descriptions</label>
        <textarea id="taskDetails" placeholder="What task items did you complete during this window?" required></textarea>
      </div>

      <div class="form-group">
        <label for="itemsProcessed">Number of Items Processed</label>
        <input type="number" id="itemsProcessed" min="0" placeholder="e.g. 15">
      </div>

      <button type="submit" id="submitBtn">Submit Task Log</button>
    </form>

    <div id="statusMessage"></div>
  </div>

  <script>
    const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbzmwrKyAHgkbh4mRpjIv0x_VRJTzIWMCy_q9oUopQoLXJHlFRyOe7PTv7cEM5m5dnNRTw/exec";
    const MASTER_TOKEN = "589643"; 

    window.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('taskDate').value = `${yyyy}-${mm}-${dd}`;
      
      generateOriginalTimeDropdownOptions();
      
      // CACHE STRATEGY: Try loading locally saved roster first for an instant draw
      initializeRosterWithCache();
    });

    function generateOriginalTimeDropdownOptions() {
      const timeSelect = document.getElementById('timeWindow');
      for(let h=0; h<24; h++) {
        for(let m=0; m<60; m+=15) {
          let startH = h % 12 === 0 ? 12 : h % 12;
          let startM = m === 0 ? "00" : m;
          let startAMPM = h >= 12 ? "PM" : "AM";
          
          let endTotalMins = (h * 60) + m + 15;
          let endHRaw = Math.floor(endTotalMins / 60) % 24;
          let endMRaw = endTotalMins % 60;
          
          let endH = endHRaw % 12 === 0 ? 12 : endHRaw % 12;
          let endM = endMRaw === 0 ? "00" : endMRaw;
          let endAMPM = endHRaw >= 12 ? "PM" : "AM";
          
          let padStartH = startH < 10 ? "0" + startH : startH;
          let padEndH = endH < 10 ? "0" + endH : endH;
          
          let optionStr = `${padStartH}:${startM} ${startAMPM} - ${padEndH}:${endM} ${endAMPM}`;
          let opt = document.createElement('option');
          opt.value = optionStr;
          opt.textContent = optionStr;
          timeSelect.appendChild(opt);
        }
      }
    }

    // --- INSTANT CACHE RENDERER ---
    function initializeRosterWithCache() {
      const cachedNames = localStorage.getItem('tracker_roster_names_cache');
      
      if (cachedNames) {
        try {
          const parsedNames = JSON.parse(cachedNames);
          renderRosterDropdown(parsedNames);
        } catch(e) { console.error("Roster cache read failed:", e); }
      }
      
      // Quietly fetch from sheet in background to ensure sync is fresh
      fetchLiveRosterFromLeads();
    }

    function renderRosterDropdown(namesArray) {
      const memberSelect = document.getElementById('teamMember');
      const currentSelection = memberSelect.value;
      
      memberSelect.innerHTML = '<option value="" disabled selected>Select your name...</option>';
      
      if (Array.isArray(namesArray) && namesArray.length > 0) {
        namesArray.forEach(name => {
          if (name) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            memberSelect.appendChild(opt);
          }
        });
        // Restore user selection if they were mid-fill during background sync refresh
        if (currentSelection) memberSelect.value = currentSelection;
      } else {
        memberSelect.innerHTML = '<option value="" disabled selected>Select your name...</option>';
      }
    }

    function fetchLiveRosterFromLeads() {
      const scriptElement = document.createElement('script');
      scriptElement.src = DEPLOY_URL + "?callback=handleRosterLoad&token=" + MASTER_TOKEN + "&_cb=" + new Date().getTime();
      document.body.appendChild(scriptElement);
    }

    window.handleRosterLoad = function(data) {
      if (data && Array.isArray(data.names)) {
        const cleanNames = data.names.filter(Boolean);
        
        // Save to browser device memory for next launch loop
        localStorage.setItem('tracker_roster_names_cache', JSON.stringify(cleanNames));
        
        // Refresh dropdown smoothly
        renderRosterDropdown(cleanNames);
      } else {
        const memberSelect = document.getElementById('teamMember');
        if (!memberSelect.value) {
          memberSelect.innerHTML = '<option value="" disabled selected>⚠️ Failed to load roster names</option>';
        }
      }
    };

    function calculateStringDuration(timeWindowStr) {
      if(!timeWindowStr || !timeWindowStr.includes(' - ')) return "15 mins";
      try {
        let parts = timeWindowStr.split(' - ');
        function toMins(tStr) {
          let clean = tStr.trim().split(' ');
          let [h, m] = clean[0].split(':').map(Number);
          if(h === 12) h = clean[1] === 'AM' ? 0 : 12;
          else if(clean[1] === 'PM') h += 12;
          return (h * 60) + m;
        }
        let diff = toMins(parts[1]) - toMins(parts[0]);
        if(diff < 0) diff += 1440; 
        let hrs = Math.floor(diff / 60);
        let mins = diff % 60;
        let out = [];
        if(hrs > 0) out.push(`${hrs} hr${hrs > 1 ? 's' : ''}`);
        if(mins > 0) out.push(`${mins} min${mins > 1 ? 's' : ''}`);
        return out.join(' ') || "0 mins";
      } catch(e) { return "15 mins"; }
    }

    function submitTaskLog(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const statusBox = document.getElementById('statusMessage');
      
      submitBtn.disabled = true;
      submitBtn.textContent = "Saving Log to Sheets...";
      statusBox.style.display = "none";

      const selectedTimeRange = document.getElementById('timeWindow').value;
      const computedDurationText = calculateStringDuration(selectedTimeRange);
      const rawProcessedInput = document.getElementById('itemsProcessed').value;

      const payloadData = {
        token: MASTER_TOKEN,
        name: document.getElementById('teamMember').value,
        date: document.getElementById('taskDate').value,
        timeWindow: selectedTimeRange,
        duration: computedDurationText,
        details: document.getElementById('taskDetails').value,
        itemsProcessed: rawProcessedInput ? parseInt(rawProcessedInput, 10) : "-"
      };

      fetch(DEPLOY_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payloadData)
      })
      .then(() => {
        statusBox.className = "status-success";
        statusBox.innerHTML = "🎉 Task logged successfully in real-time!";
        statusBox.style.display = "block";
        
        document.getElementById('taskDetails').value = "";
        document.getElementById('itemsProcessed').value = "";
        document.getElementById('timeWindow').selectedIndex = 0;
      })
      .catch(err => {
        statusBox.className = "status-error";
        statusBox.innerHTML = "❌ Network connection dropped. Please try again.";
        statusBox.style.display = "block";
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Task Log";
      });
    }
  </script>
</body>
</html>
