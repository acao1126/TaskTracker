<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Team Task Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    .time-row { display: flex; gap: 15px; margin-bottom: 5px; }
    .time-row .form-group { flex: 1; margin-bottom: 0; }
    label { font-weight: bold; margin-bottom: 5px; }
    select, textarea, button { padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; }
    textarea { height: 100px; resize: vertical; }
    button { background: #0070f3; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* Duration Display Styling */
    .duration-display { 
      font-size: 14px; 
      margin-bottom: 15px; 
      font-weight: 500;
      color: #555;
    }
    .error-text { color: #d32f2f; }
    .success-text { color: #2e7d32; }
  </style>
</head>
<body>

  <h2>Team Task Tracker</h2>
  <form id="trackerForm">
    
    <div class="form-group">
      <label for="name">Who are you?</label>
      <select id="name" required>
        <option value="">Loading team list...</option>
      </select>
    </div>

    <div class="time-row">
      <div class="form-group">
        <label for="startTime">From:</label>
        <select id="startTime" required></select>
      </div>
      <div class="form-group">
        <label for="endTime">To:</label>
        <select id="endTime" required></select>
      </div>
    </div>

    <div id="durationDisplay" class="duration-display"></div>

    <div class="form-group">
      <label for="taskDetails">What did you accomplish?</label>
      <textarea id="taskDetails" placeholder="Briefly describe your tasks..." required></textarea>
    </div>

    <button type="submit" id="submitBtn" disabled>Loading Form...</button>
  </form>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmwrKyAHgkbh4mRpjIv0x_VRJTzIWMCy_q9oUopQoLXJHlFRyOe7PTv7cEM5m5dnNRTw/exec"; 

    // Helper to turn a string like "08:15 AM" into actual minutes from midnight
    function timeToMinutes(timeStr) {
      const [time, modifier] = timeStr.split(' ');
      let [hours, minutes] = time.split(':').map(Number);
      
      if (hours === 12) {
        hours = (modifier === 'AM') ? 0 : 12;
      } else if (modifier === 'PM') {
        hours += 12;
      }
      return (hours * 60) + minutes;
    }

    // Live calculation logic
    function calculateDuration() {
      const startVal = document.getElementById('startTime').value;
      const endVal = document.getElementById('endTime').value;
      const display = document.getElementById('durationDisplay');
      const submitBtn = document.getElementById('submitBtn');

      if (!startVal || !endVal) return;

      const startMinutes = timeToMinutes(startVal);
      const endMinutes = timeToMinutes(endVal);
      const diff = endMinutes - startMinutes;

      if (diff <= 0) {
        display.innerHTML = "<span class='error-text'>⚠️ End time must be after start time.</span>";
        submitBtn.disabled = true;
      } else {
        const hours = Math.floor(diff / 60);
        const minutes = diff % 60;
        
        let durationText = "⏱️ Total Time: ";
        if (hours > 0) durationText += `${hours} hr${hours > 1 ? 's' : ''} `;
        if (minutes > 0) durationText += `${minutes} mins`;
        
        display.innerHTML = `<span class='success-text'>${durationText}</span>`;
        // Only enable if the roster list is fully loaded
        if (document.getElementById('name').value !== "") {
          submitBtn.disabled = false;
        }
      }
    }

    // Build 15-minute increments
    function generateTimeOptions() {
      const startSelect = document.getElementById('startTime');
      const endSelect = document.getElementById('endTime');
      
      let current = new Date();
      current.setHours(8, 15, 0, 0); 
      const endLimit = new Date();
      endLimit.setHours(17, 30, 0, 0); 

      while (current <= endLimit) {
        let timeString = current.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let optStart = document.createElement('option');
        optStart.value = timeString;
        optStart.textContent = timeString;
        startSelect.appendChild(optStart);

        let optEnd = document.createElement('option');
        optEnd.value = timeString;
        optEnd.textContent = timeString;
        endSelect.appendChild(optEnd);

        current.setMinutes(current.getMinutes() + 15); 
      }
      
      // Offset default to avoid 0-minute duration out of the box
      if(endSelect.options.length > 4) endSelect.selectedIndex = 4; 
    }

    // Fetch roster from Sheets
    async function loadTeamRoster() {
      const nameSelect = document.getElementById('name');
      const submitBtn = document.getElementById('submitBtn');
      
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        nameSelect.innerHTML = '<option value="">-- Select Your Name --</option>';
        
        if (data.names && data.names.length > 0) {
          data.names.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            nameSelect.appendChild(opt);
          });
          // Run calculation to initialize the duration display text
          calculateDuration();
        } else {
          nameSelect.innerHTML = '<option value="">No names found in "Leads" sheet</option>';
        }
      } catch (error) {
        nameSelect.innerHTML = '<option value="">Error loading names.</option>';
      }
    }

    // Initialize Form and attach event listeners to watch dropdown changes
    generateTimeOptions();
    loadTeamRoster();

    document.getElementById('startTime').addEventListener('change', calculateDuration);
    document.getElementById('endTime').addEventListener('change', calculateDuration);
    document.getElementById('name').addEventListener('change', calculateDuration);

    // Submission Handling
    document.getElementById('trackerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = "Saving...";
      btn.disabled = true;

      const payload = {
        name: document.getElementById('name').value,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        taskDetails: document.getElementById('taskDetails').value
      };

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        alert("Task logged successfully!");
        document.getElementById('taskDetails').value = "";
      } catch (error) {
        alert("Something went wrong. Please try again.");
      } finally {
        btn.textContent = "Submit Entry";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
