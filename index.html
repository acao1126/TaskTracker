<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Team Task Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    .time-row { display: flex; gap: 15px; }
    .time-row .form-group { flex: 1; }
    label { font-weight: bold; margin-bottom: 5px; }
    select, textarea, button { padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; }
    textarea { height: 100px; resize: vertical; }
    button { background: #0070f3; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <h2>Team Task Tracker</h2>
  <form id="trackerForm">
    
    <div class="form-group">
      <label for="name">Who are you?</label>
      <select id="name" required>
        <option value="">Loading team list...</option>
      </select>
    </div>

    <div class="time-row">
      <div class="form-group">
        <label for="startTime">From:</label>
        <select id="startTime" required></select>
      </div>
      <div class="form-group">
        <label for="endTime">To:</label>
        <select id="endTime" required></select>
      </div>
    </div>

    <div class="form-group">
      <label for="taskDetails">What did you accomplish?</label>
      <textarea id="taskDetails" placeholder="Briefly describe your tasks..." required></textarea>
    </div>

    <button type="submit" id="submitBtn" disabled>Loading Form...</button>
  </form>

  <script>
    // Paste your Google Web App URL here
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmwrKyAHgkbh4mRpjIv0x_VRJTzIWMCy_q9oUopQoLXJHlFRyOe7PTv7cEM5m5dnNRTw/exec"; 

    // Helper function to build 15-minute increments
    function generateTimeOptions() {
      const startSelect = document.getElementById('startTime');
      const endSelect = document.getElementById('endTime');
      
      let current = new Date();
      current.setHours(8, 15, 0, 0); // Start at 8:15 AM
      
      const endLimit = new Date();
      endLimit.setHours(17, 30, 0, 0); // End at 5:30 PM

      while (current <= endLimit) {
        let timeString = current.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let optStart = document.createElement('option');
        optStart.value = timeString;
        optStart.textContent = timeString;
        startSelect.appendChild(optStart);

        let optEnd = document.createElement('option');
        optEnd.value = timeString;
        optEnd.textContent = timeString;
        endSelect.appendChild(optEnd);

        current.setMinutes(current.getMinutes() + 15); // Bump by 15 mins
      }
      // Offset default selection for convenience (e.g., end time defaults to 9:00 AM if start is 8:15)
      if(endSelect.options.length > 3) endSelect.selectedIndex = 3; 
    }

    // Fetch roster data from Google Sheet "Leads" tab on page load
    async function loadTeamRoster() {
      const nameSelect = document.getElementById('name');
      const submitBtn = document.getElementById('submitBtn');
      
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        nameSelect.innerHTML = '<option value="">-- Select Your Name --</option>';
        
        if (data.names && data.names.length > 0) {
          data.names.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            nameSelect.appendChild(opt);
          });
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit Entry";
        } else {
          nameSelect.innerHTML = '<option value="">No names found in "Leads" sheet</option>';
        }
      } catch (error) {
        console.error("Failed to fetch roster:", error);
        nameSelect.innerHTML = '<option value="">Error loading names. Refresh page.</option>';
      }
    }

    // Initialize Form Variables
    generateTimeOptions();
    loadTeamRoster();

    // Form submission code
    document.getElementById('trackerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = "Saving...";
      btn.disabled = true;

      const payload = {
        name: document.getElementById('name').value,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        taskDetails: document.getElementById('taskDetails').value
      };

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        alert("Task logged successfully!");
        document.getElementById('taskDetails').value = "";
      } catch (error) {
        alert("Something went wrong. Please try again.");
      } finally {
        btn.textContent = "Submit Entry";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
